apiVersion: deepcode/v1alpha1
kind: Agent
metadata:
  name: my-agent
spec:
  description: "A deepfactory-code agent."
  providerRef:
    name: openai-main
  memoryRef:
    name: sqlite-main
  toolSetRef:
    name: default-tools
  policyRef:
    name: supervised-policy
  channels:
    - name: webhook-main
  runtime:
    baseTag: local
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    maxSteps: 24
    maxDurationMs: 60000
    stream: true
  autonomy:
    mode: supervised
